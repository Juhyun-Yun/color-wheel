<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Centered Complete Mosaic Path (S-Curve) -->
  <!-- Top Curve -->
  <rect x="170" y="40" width="50" height="50" fill="none" stroke="black" stroke-width="5" transform="rotate(-15, 195, 65)" />
  <rect x="230" y="60" width="50" height="50" fill="none" stroke="black" stroke-width="5" transform="rotate(5, 255, 85)" />
  <rect x="280" y="100" width="50" height="50" fill="none" stroke="black" stroke-width="5" transform="rotate(25, 305, 125)" />
  
  <!-- Middle Curve -->
  <rect x="250" y="170" width="50" height="50" fill="none" stroke="black" stroke-width="5" transform="rotate(10, 275, 195)" />
  <rect x="190" y="210" width="50" height="50" fill="none" stroke="black" stroke-width="5" transform="rotate(-10, 215, 235)" />
  <rect x="130" y="230" width="50" height="50" fill="none" stroke="black" stroke-width="5" transform="rotate(-30, 155, 255)" />

  <!-- Bottom Curve -->
  <rect x="70" y="270" width="50" height="50" fill="none" stroke="black" stroke-width="5" transform="rotate(-15, 95, 295)" />
  <rect x="50" y="330" width="50" height="50" fill="none" stroke="black" stroke-width="5" transform="rotate(10, 75, 355)" />
  
  <!-- Secondary row to make it thicker and more unified -->
  <rect x="120" y="55" width="50" height="50" fill="none" stroke="black" stroke-width="5" transform="rotate(-10, 145, 80)" />
  <rect x="180" y="110" width="50" height="50" fill="none" stroke="black" stroke-width="5" transform="rotate(0, 205, 135)" />
  <rect x="240" y="230" width="50" height="50" fill="none" stroke="black" stroke-width="5" transform="rotate(15, 265, 255)" />
  <rect x="110" y="290" width="50" height="50" fill="none" stroke="black" stroke-width="5" transform="rotate(-20, 135, 315)" />
</svg>
