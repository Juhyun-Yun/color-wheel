<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10색상환 친구들</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-overlay" class="overlay">
        <div class="login-card glass-card">
            <h1>🎨 10색상환 친구들</h1>
            <p>여러분의 이름을 선택하고 탐험을 시작해요!</p>
            <select id="student-name-input" class="student-select">
                <option value="">선택하세요</option>
            </select>
            <button id="start-btn" class="primary-btn-large">탐험 시작하기!</button>
        </div>
    </div>
    
    <div class="app-container hidden" id="main-app">
        <header><h1><span id="welcome-name"></span>님, 환영해요! 🎨</h1></header>
        <div class="app-layout">
            <main class="content-area">
                <!-- 01 탐험하기 -->
                <section id="explore-view" class="view-content active">
                    <div class="explore-grid">
                        <div class="wheel-section">
                            <div class="wheel-wrapper">
                                <svg viewBox="0 0 400 400" id="color-wheel"></svg>
                                <div class="wheel-center">10색상환<br>탐험하기</div>
                            </div>
                        </div>
                        <div class="info-section">
                            <div id="intro-card" class="color-card">
                                <h2>색깔을 눌러보세요!</h2>
                                <p>왼쪽의 색상환에서 궁금한 색을 클릭하면<br>그 색깔의 이름과 느낌을 알 수 있어요.</p>
                            </div>
                            <div id="color-card" class="color-card hidden">
                                <div id="color-indicator"></div>
                                <h2 id="color-name">색깔 이름</h2>
                                <p id="color-feeling"></p>
                                <button class="next-step-btn primary-btn" data-target="create-wheel-view">다음 단계로 가기 ➔</button>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- 02 완성하기 -->
                <section id="create-wheel-view" class="view-content">
                    <div class="creation-layout">
                        <div class="target-wheel-container">
                            <div class="wheel-wrapper">
                                <svg viewBox="0 0 400 400" id="creation-wheel"></svg>
                                <div class="wheel-center">정답을<br>맞혀봐!</div>
                            </div>
                        </div>
                        <div class="mixing-panel">
                            <h3>🎨 색깔 공방</h3>
                            <div class="primary-pool" id="primary-pool"></div>
                            <div class="mixing-bowl"><div id="bowl-content" class="bowl-mixture"></div></div>
                            <div class="mix-result-area">
                                <div id="mix-result-preview" class="result-preview"></div>
                                <div class="result-info">
                                    <div id="mix-result-name">물감을 섞어보세요</div>
                                    <div id="mix-ratio-display">빨강: 0 | 노랑: 0 | 파랑: 0</div>
                                </div>
                            </div>
                            <div class="creation-controls">
                                <button id="clear-bowl" class="secondary-btn">다시 하기</button>
                                <button id="check-creation" class="primary-btn">완성!</button>
                            </div>
                        </div>
                    </div>
                    <div style="display:flex; justify-content:center; margin-top:10px;">
                        <button class="next-step-btn primary-btn" data-target="paint-view" style="padding:15px 40px; font-size:1.1rem; box-shadow: 0 10px 20px rgba(0,0,0,0.1);">나만의 그림 그리기 ➔</button>
                    </div>
                </section>

                <!-- 03 그리기 -->
                <section id="paint-view" class="view-content">
                    <div class="selection-row">
                        <div class="control-group">
                            배경: 
                            <button id="bg-mode-blank" class="mode-btn active">빈 종이</button>
                            <button id="bg-mode-outline" class="mode-btn">밑그림</button>
                        </div>
                        <div class="control-group">
                            기분: 
                            <button id="theme-warm-energy" class="theme-btn energy-glow">열정적인 기분</button>
                            <button id="theme-warm-spring" class="theme-btn spring-glow">싱그러운 기분</button>
                            <button id="theme-cool-winter" class="theme-btn cool-glow">시원한 기분</button>
                        </div>
                    </div>
                    <div class="canvas-container">
                        <div class="paint-sidebar">
                            <div id="restricted-palette" class="palette-grid"></div>
                            <div class="brush-controls">
                                붓 굵기
                                <input type="range" id="brush-size" min="1" max="50" value="10">
                            </div>
                            <div class="inspiration-box">
                                <p>💡 이런 느낌 어때요?</p>
                                <img id="theme-example-img" src="">
                            </div>
                            <div class="button-group">
                                <button id="clear-canvas" class="secondary-btn">지우기</button>
                                <button id="save-canvas" class="primary-btn">저장</button>
                            </div>
                        </div>
                        <div class="canvas-wrapper">
                            <canvas id="drawing-canvas"></canvas>
                        </div>
                    </div>
                </section>

                <!-- 04 갤러리 -->
                <section id="gallery-view" class="view-content">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <h2>🖼️ 학생 작품 갤러리</h2>
                        <button id="refresh-gallery" class="secondary-btn">새로고침 🔄</button>
                    </div>
                    <div id="gallery-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:25px; overflow-y:auto;">
                        <!-- 작품들이 여기에 동적으로 생성됩니다 -->
                    </div>
                </section>
            </main>
        </div>

        <aside class="side-index">
            <button class="index-btn active" data-target="explore-view">
                <span class="step-num">01</span>
                <span class="step-text">10색상환<br>알아보기</span>
            </button>
            <button class="index-btn" data-target="create-wheel-view">
                <span class="step-num">02</span>
                <span class="step-text">10색상환<br>완성하기</span>
            </button>
            <button class="index-btn" data-target="paint-view">
                <span class="step-num">03</span>
                <span class="step-text">나만의<br>그림 그리기</span>
            </button>
            <button class="index-btn" data-target="gallery-view" style="border-right-color: #feca57;">
                <span class="step-num">04</span>
                <span class="step-text">우리반<br>갤러리</span>
            </button>
        </aside>
    </div>

    <!-- 스크립트 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
