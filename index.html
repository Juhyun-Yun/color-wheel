<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10색상환 친구들</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=10">
</head>
<body>

    <!-- ⚙️ 설정 모달 -->
    <div id="settings-modal" class="settings-overlay hidden">
        <div class="glass-card settings-card">
            <div class="settings-header">
                <h2>⚙️ 내 학급 연결하기</h2>
                <button id="close-settings" class="close-btn">✕</button>
            </div>

            <div class="settings-section">
                <label class="settings-label">Apps Script 주소</label>
                <input type="url" id="endpoint-input" class="settings-input"
                    placeholder="https://script.google.com/.../exec">
                <div class="settings-btn-row">
                    <button id="test-connection" class="secondary-btn">연결 테스트</button>
                    <button id="save-settings" class="primary-btn">저장하기</button>
                </div>
                <p id="connection-status" class="connection-status"></p>
            </div>

            <div id="student-url-section" class="settings-section hidden">
                <hr class="settings-divider">
                <label class="settings-label">📤 학생용 주소</label>
                <div class="url-copy-row">
                    <input type="text" id="student-url-display" class="settings-input url-readonly" readonly>
                    <button id="copy-student-url" class="secondary-btn copy-btn">복사</button>
                </div>
                <p class="settings-hint">이 주소를 학생들에게 공유하면 바로 입장 가능해요!</p>
            </div>
        </div>
    </div>

    <!-- 자기 평가 모달 -->
    <div id="self-eval-modal" class="settings-overlay hidden">
        <div class="glass-card settings-card" style="max-width:420px;">
            <div class="settings-header">
                <h2>✏️ 내 그림 자기 평가</h2>
            </div>
            <div class="settings-section">
                <label class="settings-label">내 그림에서 가장 마음에 드는 부분은?</label>
                <textarea id="self-eval-comment" class="settings-input"
                    placeholder="색깔, 느낌, 표현한 것 등을 자유롭게 적어봐요!"
                    style="resize:none; height:90px;"></textarea>
            </div>
            <div class="settings-section">
                <label class="settings-label">나의 노력 점수</label>
                <div class="star-rating" id="star-rating">
                    <button class="star-btn" data-rating="1">☆</button>
                    <button class="star-btn" data-rating="2">☆</button>
                    <button class="star-btn" data-rating="3">☆</button>
                    <button class="star-btn" data-rating="4">☆</button>
                    <button class="star-btn" data-rating="5">☆</button>
                </div>
            </div>
            <div class="settings-btn-row" style="margin-top:20px;">
                <button id="self-eval-cancel" class="secondary-btn">나중에</button>
                <button id="self-eval-submit" class="primary-btn">저장하기</button>
            </div>
        </div>
    </div>

    <!-- 로그인 화면 -->
    <div id="login-overlay" class="overlay">
        <div class="login-card glass-card">
            <h1>🎨 10색상환 친구들</h1>

            <div id="login-section" class="hidden">
                <p>여러분의 이름을 선택하고 탐험을 시작해요!</p>
                <div class="student-dropdown" id="student-dropdown">
                    <button class="student-dropdown-trigger" id="student-dropdown-trigger" type="button">
                        <span id="student-dropdown-label">이름을 선택하세요</span>
                        <span class="dropdown-arrow">▼</span>
                    </button>
                    <div class="student-dropdown-menu hidden" id="student-dropdown-menu">
                        <div id="student-list" class="student-list"></div>
                    </div>
                </div>
                <input type="hidden" id="student-name-input">
                <button id="start-btn" class="primary-btn-large" disabled>탐험 시작하기!</button>
            </div>

            <!-- 선생님 설정 버튼 (시작 버튼 바로 아래) -->
            <div class="settings-footer">
                <button id="settings-btn" class="settings-link-btn">⚙️ 선생님 설정</button>
            </div>
        </div>
    </div>

    <!-- 메인 앱 -->
    <div class="app-container hidden" id="main-app">
        <header><h1><span id="welcome-name"></span>님, 환영해요! 🎨</h1></header>
        <div class="app-layout">
            <main class="content-area">

                <!-- 01 탐험하기 -->
                <section id="explore-view" class="view-content active">
                    <div class="explore-grid">
                        <div class="wheel-section">
                            <div class="wheel-wrapper">
                                <svg viewBox="0 0 400 400" id="color-wheel"></svg>
                                <div class="wheel-center">10색상환<br>탐험하기</div>
                            </div>
                        </div>
                        <div class="info-section">
                            <div id="intro-card" class="color-card">
                                <h2>색깔을 눌러보세요!</h2>
                                <p>왼쪽의 색상환에서 궁금한 색을 클릭하면<br>그 색깔의 이름과 느낌을 알 수 있어요.</p>
                            </div>
                            <div id="color-card" class="color-card hidden">
                                <div id="color-indicator"></div>
                                <h2 id="color-name">색깔 이름</h2>
                                <p id="color-feeling"></p>
                                <button class="next-step-btn primary-btn" id="explore-next-btn" data-target="create-wheel-view" disabled>다음 단계로 가기 ➔</button>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- 02 완성하기 -->
                <section id="create-wheel-view" class="view-content">
                    <div class="creation-layout">
                        <div class="target-wheel-container">
                            <div class="wheel-wrapper">
                                <svg viewBox="0 0 400 400" id="creation-wheel"></svg>
                                <div class="wheel-center">정답을<br>맞혀봐!</div>
                            </div>
                        </div>
                        <div class="mixing-panel">
                            <h3>🎨 색깔 공방</h3>
                            <div class="primary-pool" id="primary-pool"></div>
                            <div class="mixing-bowl"><div id="bowl-content" class="bowl-mixture"></div></div>
                            <div class="mix-result-area">
                                <div id="mix-result-preview" class="result-preview"></div>
                                <div class="result-info">
                                    <div id="mix-result-name">물감을 섞어보세요</div>
                                    <div id="mix-ratio-display">빨강: 0 | 노랑: 0 | 파랑: 0</div>
                                </div>
                            </div>
                            <div class="creation-controls">
                                <button id="clear-bowl" class="secondary-btn">다시 하기</button>
                                <button id="check-creation" class="primary-btn">완성!</button>
                            </div>
                        </div>
                    </div>
                    <div style="display:flex; justify-content:center; margin-top:40px;">
                        <button class="next-step-btn primary-btn" data-target="paint-view" style="padding:15px 40px; font-size:1.1rem; box-shadow: 0 10px 20px rgba(0,0,0,0.1);">나만의 그림 그리기 ➔</button>
                    </div>
                </section>

                <!-- 03 그리기 -->
                <section id="paint-view" class="view-content">
                    <div class="selection-row">
                        <div class="control-group">
                            배경:
                            <button id="bg-mode-blank" class="mode-btn active">빈 종이</button>
                            <button id="bg-mode-outline" class="mode-btn">밑그림</button>
                        </div>
                        <div class="control-group">
                            기분:
                            <button id="theme-warm-energy" class="theme-btn energy-glow">열정적인 기분</button>
                            <button id="theme-warm-spring" class="theme-btn spring-glow">싱그러운 기분</button>
                            <button id="theme-cool-winter" class="theme-btn cool-glow">시원한 기분</button>
                        </div>
                    </div>
                    <div class="canvas-container">
                        <div class="paint-sidebar">
                            <div id="restricted-palette" class="palette-grid"></div>
                            <div class="brush-controls">
                                <div class="brush-row">
                                    <span>붓 굵기</span>
                                    <input type="range" id="brush-size" min="1" max="50" value="10">
                                </div>
                                <div class="brush-row">
                                    <button id="eraser-btn" class="mode-btn tool-btn">🧹 지우개</button>
                                    <button id="clear-canvas" class="mode-btn tool-btn">🗑️ 전체 지우기</button>
                                </div>
                            </div>
                            <div class="inspiration-box">
                                <p>💡 이런 느낌 어때요?</p>
                                <img id="theme-example-img" src="">
                            </div>
                            <div class="button-group">
                                <button id="save-canvas" class="primary-btn">저장</button>
                            </div>
                        </div>
                        <div class="canvas-wrapper">
                            <canvas id="drawing-canvas"></canvas>
                        </div>
                    </div>
                </section>

                <!-- 04 갤러리 -->
                <section id="gallery-view" class="view-content">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <h2>🖼️ 학생 작품 갤러리</h2>
                        <button id="refresh-gallery" class="secondary-btn">새로고침 🔄</button>
                    </div>
                    <div id="gallery-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:25px; overflow-y:auto;">
                    </div>
                </section>

            </main>
        </div>

        <aside class="side-index">
            <button class="index-btn active" data-target="explore-view">
                <span class="step-num">01</span>
                <span class="step-text">10색상환<br>알아보기</span>
            </button>
            <button class="index-btn" data-target="create-wheel-view">
                <span class="step-num">02</span>
                <span class="step-text">10색상환<br>완성하기</span>
            </button>
            <button class="index-btn" data-target="paint-view">
                <span class="step-num">03</span>
                <span class="step-text">나만의<br>그림 그리기</span>
            </button>
            <button class="index-btn" data-target="gallery-view">
                <span class="step-num">04</span>
                <span class="step-text">우리반<br>갤러리</span>
            </button>
        </aside>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js?v=10"></script>
</body>
</html>
